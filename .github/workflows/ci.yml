name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 (syntax & logic errors only)
        run: flake8 FastAPI/ Streamlit/ IA/ --select=E9,F63,F7,F82 --show-source

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build FastAPI image
        run: docker build -f FastAPI/Dockerfile -t fastapi-app .

      - name: Build Streamlit image
        run: docker build -f Streamlit/Dockerfile -t streamlit-app .

  integration:
    name: Integration test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for FastAPI health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:40001/health; then
              echo "FastAPI is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "FastAPI failed to start"
          docker compose logs
          exit 1

      - name: Check Streamlit is up
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:40000/_stcore/health; then
              echo "Streamlit is healthy"
              exit 0
            fi
            echo "Waiting... ($i/15)"
            sleep 2
          done
          echo "Streamlit failed to start"
          docker compose logs
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down

  deploy:
    name: Deploy to NAS
    runs-on: [self-hosted, nas]
    needs: integration
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Stop existing containers
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down || true

      - name: Build and start services
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

      - name: Wait for FastAPI health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://fastapi_efrei_data_science:8000/health; then
              echo "Deployed successfully - FastAPI is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Deployment failed"
          docker compose -f docker-compose.yml -f docker-compose.prod.yml logs
          exit 1
